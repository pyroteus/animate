name: Build and push firedrake-parmmg Docker image to DockerHub

on:
  workflow_call:

    inputs:
      status:
        description: 'Animate test status'
        required: true
        type: string

    secrets:
      DOCKERHUB_USER:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  docker_workflow:
    name: 'Build the firedrake-parmmg container'
    runs-on: ubuntu-latest
    if: ${{ inputs.status == 'success' }}
    steps:

      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Log into DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push firedrake-parmmg
        uses: docker/build-push-action@v4
        with:
          push: true
          no-cache: true
          file: docker/Dockerfile.parmmg
          tags: jwallwork/firedrake-parmmg:latest
